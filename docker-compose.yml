services:
  postgres:
    image: postgres:16-alpine
    container_name: evconnect-postgres
    environment:
      POSTGRES_USER: evconnect
      POSTGRES_PASSWORD: evconnect123
      POSTGRES_DB: evconnect_india
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: evconnect-redis
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
